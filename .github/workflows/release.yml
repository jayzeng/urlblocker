name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump manifest version
        id: version
        run: |
          VERSION=$(python - <<'PY'
          import json
          import re

          with open("manifest.json", "r", encoding="utf-8") as f:
              manifest = json.load(f)

          current = manifest.get("version", "0.0.0")
          match = re.match(r"^(\d+)\.(\d+)\.(\d+)$", current)
          if not match:
              raise SystemExit(f"Unsupported manifest version format: {current}")

          major, minor, patch = map(int, match.groups())
          patch += 1
          new_version = f"{major}.{minor}.{patch}"
          manifest["version"] = new_version

          with open("manifest.json", "w", encoding="utf-8") as f:
              json.dump(manifest, f, indent=2)
              f.write("\n")

          print(new_version)
          PY
          )
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "Bump manifest version to v${{ steps.version.outputs.version }}"
          git push origin HEAD

      - name: Create tag
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists."
            exit 1
          fi
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Package extension
        id: package
        run: |
          ZIP_NAME="urlblocker-v${{ steps.version.outputs.version }}.zip"
          zip -r "$ZIP_NAME" \
            background.js \
            content.js \
            manifest.json \
            make-icons.js \
            test-matching.js \
            blocked \
            dashboard \
            icons \
            options \
            popup \
            shared \
            AGENTS.md \
            CLAUDE.md \
            README.md
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: ${{ steps.package.outputs.zip_name }}
